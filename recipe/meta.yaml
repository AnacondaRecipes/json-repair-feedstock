{% set name = "json-repair" %}
{% set version = "0.58.7" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  - url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name|replace("-", "_") }}-{{ version }}.tar.gz
    sha256: 2ea5c841cc1d91dbbe79e9ed4b2b77a5cc04d20892d62a15261b70ce999ec758
  - url: https://github.com/mangiucugna/{{ name|replace("-", "_") }}/archive/refs/tags/v{{ version }}.tar.gz
    sha256: 1a5ef33fe5d90f12ccbd01aa13992efa2d77c211ac5b9ce48adcc8c79221f401
    folder: gh_src

build:
  number: 0
  skip: true  # [py<310]
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - pip
    - python
    - setuptools >=61.0
    - wheel
  run:
    - python
  run_constrained:
    - jsonschema >=4.21
    - pydantic >=2

# fixture 'benchmark' not found
{% set ignore_tests = "--ignore=gh_src/tests/test_performance.py" %}
{% set deselect_tests = "" %}
# PermissionError: [WinError 32] The process cannot access the file because it is being used by another process
{% set deselect_tests = deselect_tests + " --deselect=gh_src/tests/test_repair_json_cli.py::test_cli" %}  # [win]

test:
  source_files:
    - gh_src/src
    - gh_src/tests
  imports:
    - json_repair
  requires:
    - pip
    - pytest
    - jsonschema
  commands:
    - pip check
    - PYTHONPATH=gh_src pytest -v gh_src/tests {{ ignore_tests }} {{ deselect_tests }}  # [not win]
    - set PYTHONPATH=gh_src && pytest -v gh_src/tests {{ ignore_tests }} {{ deselect_tests }}  # [win]

about:
  home: https://github.com/mangiucugna/json_repair
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: A package to repair broken json strings
  description: A package to repair broken json strings
  doc_url: https://github.com/mangiucugna/json_repair
  dev_url: https://github.com/mangiucugna/json_repair

extra:
  recipe-maintainers:
    - jan-janssen
